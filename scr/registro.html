<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="icon" href="multimedia/logo_BT.ico" type="image/x-icon"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/registro.css">
</head>
<body>

    <div class="register-container">
        <div class="form-column">
            <div class="top-bar">
                <a href="index.html" class="back-link">
                    <i class="bi bi-arrow-left-circle-fill"></i> Regresar
                </a>
            </div>

            <div class="register-box">
                <h2>Registrarse</h2>

                <form id="registerForm" action="/registrar_usuario" method="POST" novalidate>

                    <div class="mb-3 text-start">
                        <input type="text" class="form-control" id="firstNameInput" name="firstName" placeholder="Nombre(s)" maxlength="50" required>
                    </div>
                    <div class="mb-3 text-start">
                        <input type="text" class="form-control" id="lastNamePInput" name="lastNameP" placeholder="Apellido paterno" maxlength="50" required>
                    </div>
                    <div class="mb-3 text-start">
                        <input type="text" class="form-control" id="lastNameMInput" name="lastNameM" placeholder="Apellido materno" maxlength="50">
                    </div>

                    <div class="mb-3 text-start">
                        <input type="email" class="form-control" id="emailInput" name="email" placeholder="Correo electrónico" required>
                    </div>

                    <div class="mb-3 text-start">
                        <div class="input-group">
                            <input type="password" class="form-control" id="passwordInput" name="password" placeholder="Contraseña" required>
                            <button class="btn btn-outline-secondary toggle-password" type="button"
                                    id="togglePassword" aria-label="Mostrar u ocultar contraseña">
                                <i class="bi bi-eye-fill" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3 text-start">
                        <div class="input-group">
                            <input type="password" class="form-control" id="confirmPasswordInput" name="confirmPassword" placeholder="Confirmar contraseña" required>
                            <button class="btn btn-outline-secondary toggle-password" type="button"
                                    id="toggleConfirmPassword" aria-label="Mostrar u ocultar confirmación de contraseña">
                                <i class="bi bi-eye-fill" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3 form-check text-start">
                        <input type="checkbox" class="form-check-input" id="termsCheck" name="termsCheck" required>
                        <label class="form-check-label text-muted" for="termsCheck">
                            Acepto los <a href="#" class="text-primary">términos y condiciones</a>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary">Registrarse</button>
                    <p class="mt-4 text-muted">¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a></p>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('togglePassword').addEventListener('click', () => {
            const input = document.getElementById('passwordInput');
            input.type = input.type === 'password' ? 'text' : 'password';
        });

        document.getElementById('toggleConfirmPassword').addEventListener('click', () => {
            const input = document.getElementById('confirmPasswordInput');
            input.type = input.type === 'password' ? 'text' : 'password';
        });
    </script>

</body>
</html>
