<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/login.css"></link>
</head>
<body>

    <!-- loader de carga de página -->
    <div class="loader-page-overlay" id="pageLoaderOverlay">
        <div class="loader-page-text">Cargando...</div>
    </div>

    <!-- alerta personalizada glassmorphism -->
    <div id="customAlert" class="custom-alert-container">
        <div class="custom-alert-box">
            <p id="customAlertMessage"></p>
            <button id="customAlertClose" class="btn btn-primary">Aceptar</button>
        </div>
    </div>

    <div class="login-container">
        <div class="form-column col-12 col-md-6">
            <div class="top-bar">
                <a href="index.html" class="back-link">
                    <i class="bi bi-arrow-left-circle-fill"></i> Regresar
                </a>
            </div>

            <div class="login-box">
                <h2>Iniciar sesión</h2>
                <form id="loginForm" novalidate>
                    <div class="mb-3 text-start">
                        <label for="emailInput" class="form-label visually-hidden">Correo electrónico</label>
                        <input type="email" class="form-control" id="emailInput" placeholder="Correo electrónico" required>
                        <div class="error-message" id="emailError"></div>
                    </div>
                    <div class="mb-3 text-start">
                        <label for="passwordInput" class="form-label visually-hidden">Contraseña</label>
                        <input type="password" class="form-control" id="passwordInput" placeholder="Contraseña" required>
                        <div class="error-message" id="passwordError"></div>
                    </div>
                    <!-- se eliminan las opciones de "recordarme" y "olvidaste tu contraseña" -->
                    <button type="submit" class="btn btn-primary">Ingresar</button>
                    <p class="mt-4 text-muted">¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a></p>
                </form>
            </div>
        </div>
    </div>

    <!-- loader de inicio de sesión -->
    <div class="loader-overlay" id="loaderOverlay">
        <div class="loader-icon"><i class="bi bi-briefcase-fill"></i></div>
        <div class="loader-text">Verificando credenciales...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" xintegrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="js/login.js"></script>

<form id="loginForm" method="POST" action="{{ url_for('login_usuario') }}" novalidate>
    <div class="mb-3 text-start">
        <label for="emailInput" class="form-label visually-hidden">Correo electrónico</label>
        <input type="email" class="form-control" id="emailInput" name="email" placeholder="Correo electrónico" required>
        <div class="error-message" id="emailError"></div>
    </div>
    <div class="mb-3 text-start">
        <label for="passwordInput" class="form-label visually-hidden">Contraseña</label>
        <input type="password" class="form-control" id="passwordInput" name="password" placeholder="Contraseña" required>
        <div class="error-message" id="passwordError"></div>
    </div>
    <button type="submit" class="btn btn-primary">Ingresar</button>
    <p class="mt-4 text-muted">¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a></p>
</form>


</body>
</html>
