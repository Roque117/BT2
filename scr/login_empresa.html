<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Empresa | Bolsa de Trabajo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --dark: #1e293b;
            --light: #f8fafc;
        }
        
        body {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }
        
        .login-container {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .login-logo img {
            max-width: 150px;
        }
        
        .login-title {
            text-align: center;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.2rem;
        }
        
        .form-group label {
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #334155;
        }
        
        .form-control {
            padding: 0.8rem 1rem;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15);
        }
        
        .btn-login {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            padding: 0.8rem;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
        }
        
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
        }
        
        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        
        .error-message {
            color: #e53e3e;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="login-title">Iniciar Sesión Empresa</h1>
        
        <form id="loginEmpresaForm">
            <div class="form-group">
                <label for="correo">Correo Electrónico *</label>
                <input type="email" class="form-control" id="correo" name="correo" required>
                <div class="error-message" id="error-correo"></div>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña *</label>
                <input type="password" class="form-control" id="password" name="password" required>
                <div class="error-message" id="error-password"></div>
            </div>
            
            <button type="submit" class="btn btn-login">Iniciar Sesión</button>
        </form>
        
        <div class="login-footer mt-4">
            <p>¿No tienes cuenta? <a href="registro_empresa.html">Regístrate aquí</a></p>
            <p>¿Eres candidato? <a href="login.html">Inicia sesión como candidato</a></p>
        </div>
        
        <div id="mensaje" class="mt-3"></div>
    </div>

    <script>
        document.getElementById('loginEmpresaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Limpiar mensajes anteriores
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
            document.getElementById('mensaje').textContent = '';
            document.getElementById('mensaje').className = '';
            
            // Recoger datos del formulario
            const formData = {
                correo: document.getElementById('correo').value,
                password: document.getElementById('password').value
            };
            
            // Enviar datos al servidor
            fetch('/login_empresa', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Redirigir al dashboard de empresa
                    window.location.href = data.redirect;
                } else {
                    document.getElementById('mensaje').textContent = data.message || 'Error en el inicio de sesión';
                    document.getElementById('mensaje').style.color = 'red';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('mensaje').textContent = 'Error de conexión';
                document.getElementById('mensaje').style.color = 'red';
            });
        });
    </script>
</body>
</html>
